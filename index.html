<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Jardin de Rosette & Rosario</title>
    <style>
        :root { --accent: #d4af37; --primary: #bb86fc; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); width: 100%; max-width: 550px; border: 1px solid #222; }
        h1 { color: var(--accent); text-align: center; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 10px; }
        p.intro { text-align: center; font-style: italic; color: #888; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; line-height: 1.6; }
        h3 { color: var(--primary); margin-top: 40px; font-size: 1.2rem; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 15px; }
        .q-group { margin-bottom: 30px; background: #1c1c1c; padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a; }
        label { display: block; margin-bottom: 12px; font-weight: bold; color: #ccc; font-size: 0.95rem; }
        select, textarea, input[type="text"] { width: 100%; background: #262626; border: 1px solid #3d3d3d; color: white; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; transition: 0.3s; }
        select:focus, textarea:focus, input:focus { border-color: var(--accent); outline: none; background: #333; }
        .btn-send { background: linear-gradient(45deg, #d4af37, #f2d06b); color: #000; border: none; padding: 20px; border-radius: 50px; width: 100%; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 40px; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .btn-send:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        .footer { text-align: center; font-size: 0.75rem; color: #444; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌹 Pour ma précieuse Rosette</h1>
    <p class="intro">"L'intimité est le sanctuaire de notre amour. Confie-moi tes désirs les plus profonds en toute sérénité."</p>

    <form action="https://formspree.io/f/xwvrgbgy" method="POST">
        
        <h3>✨ Notre Connexion Émotionnelle</h3>
        <div class="q-group">
            <label>Ton humeur actuelle avec moi ?</label>
            <select name="Humeur_Actuelle">
                <option value="Passionnée">Passionnée & Intense</option>
                <option value="Douce">Douce & Romantique</option>
                <option value="Coquine">Coquine & Joueuse</option>
                <option value="Câline">Besoin d'un long câlin</option>
            </select>
            <input type="text" name="Humeur_Précision" placeholder="Ou décris ton ressenti ici...">
        </div>

        <div class="q-group">
            <label>Quel est ton meilleur souvenir avec moi ces derniers temps ?</label>
            <textarea name="Meilleur_Souvenir" rows="2"></textarea>
        </div>

        <div class="q-group">
            <label>Une habitude chez moi que tu trouves mignonne ?</label>
            <input type="text" name="Habitude_Mignonne">
        </div>

        <h3>🔥 Sensualité & Corps</h3>
        <div class="q-group">
            <label>Quelle partie de mon corps préfères-tu explorer ?</label>
            <input type="text" name="Zone_Préférée_Rosario">
        </div>

        <div class="q-group">
            <label>Quelle zone de TON corps aimerais-tu que je masse ce soir ?</label>
            <input type="text" name="Zone_Massage_Rosette">
            <input type="text" name="Autre_Zone_Corps" placeholder="Une autre envie corporelle ?">
        </div>

        <div class="q-group">
            <label>Quelle musique ou ambiance pour notre prochain moment ?</label>
            <input type="text" name="Ambiance_Musicale">
        </div>

        <h3>🔞 Nos Désirs les plus Secrets</h3>
        <div class="q-group">
            <label>Ce soir, tu es plutôt d'humeur...</label>
            <select name="Style_Intimité">
                <option value="Douce">Douce et lente</option>
                <option value="Sauvage">Sauvage et sans limites</option>
                <option value="Exploratrice">Exploratrice (nouveautés)</option>
                <option value="Jeu de rôle">Jeu de rôle / Scénario</option>
            </select>
            <input type="text" name="Style_Précision" placeholder="Précise ton envie ici...">
        </div>

        <div class="q-group">
            <label>Un endroit audacieux où tu aimerais qu'on soit seuls ?</label>
            <input type="text" name="Lieu_Audacieux">
        </div>

        <div class="q-group">
            <label>Un fantasme que tu veux explorer avec moi ?</label>
            <textarea name="Fantasme_Secret" rows="3" placeholder="Dis-moi tout, je suis ton confident..."></textarea>
        </div>

        <div class="q-group">
            <label>Une chose que j'ai faite récemment et qui t'a excitée ?</label>
            <textarea name="Déclic_Excitant" rows="2"></textarea>
        </div>

        <h3>🎲 Jeux & Promesses</h3>
        <div class="q-group">
            <label>Si je te donnais un "Bon pour un service", que choisirais-tu ?</label>
            <select name="Service_Choisi">
                <option value="Petit-dej">Petit-déjeuner au lit</option>
                <option value="Obéissance">Obéissance totale (1h)</option>
                <option value="Massage Huile">Massage intégral à l'huile</option>
                <option value="Surprise">Une surprise totale</option>
            </select>
            <input type="text" name="Service_Autre" placeholder="Invente ton propre cadeau...">
        </div>

        <div class="q-group">
            <label>À quel point as-tu hâte qu'on se voie ? (1 à 10)</label>
            <input type="text" name="Note_Impatience" placeholder="Note ton impatience de 1 à 10">
        </div>

        <div class="q-group">
            <label>Un petit mot doux ou un secret pour finir ?</label>
            <textarea name="Mot_De_Fin" rows="2"></textarea>
        </div>

        <button type="submit" class="btn-send">Confier mes secrets à mon Rosario 🕊️</button>
    </form>

    <div class="footer">
        CONCEPTION PERSONNALISÉE PAR ROSARIO TECH TIPS • 2026
    </div>
</div>

</body>
</html>
